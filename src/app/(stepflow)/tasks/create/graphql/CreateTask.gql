mutation CreateTask($input: CreateTaskInput!) {
  createTask(input: $input) {
    id
    title
    description
    category
    budget {
      amount
      currency
      type
      paymentMethod
    }
    datetime {
      date
      time
      type
    }
    images
    status
    location {
      lat
      lng
      name
      address
    }
    poster {
      id
      profile {
        name
      }
    }
    quotes {
      id
    }
  }
}
