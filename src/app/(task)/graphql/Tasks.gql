query Tasks($filter: TaskFilter, $sort: TaskSort) {
  tasks(filter: $filter, sort: $sort) {
    id
    title
    description
    category
    acceptedWorkerCap
    budget {
      amount
      currency
      type
      paymentMethod
    }
    datetime {
      date
      time
      type
    }
    contactMethod
    images
    status
    completedAt
    confirmedAt
    createdAt
    location {
      lat
      lng
      name
      address
    }
    poster {
      id
      profile {
        name
        avatarUrl
      }
    }
  }
}
