# PUBLIC task meta only — the fast, auth-free SSR query behind the task detail
# shell (title, images, budget, approximate location, poster identity). Viewer-
# scoped data and quotes are fetched client-side via Task.gql.
query TaskCore($id: ID!) {
  task(id: $id) {
    id
    title
    description
    category
    views
    budget {
      amount
      currency
      type
      paymentMethod
    }
    datetime {
      date
      time
      type
    }
    images
    status
    location {
      lat
      lng
      name
    }
    poster {
      id
      profile {
        name
        avatarUrl
      }
    }
  }
}
