#import "./fragments/TaskCoreFields.gql"

# PUBLIC task meta only — the fast, auth-free SSR query behind the task detail
# shell (title, images, budget, approximate location, poster identity). Viewer-
# scoped data (orders, timeline, contact details, exact address, live status)
# and quotes are fetched client-side via Task.gql. Keeping this selection
# minimal keeps SSR TTFB low.
query TaskCore($id: ID!) {
  task(id: $id) {
    ...TaskCoreFields
  }
}
