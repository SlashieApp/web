# Order selection deliberately inlined (task-detail documents stay
# self-contained instead of importing another feature's fragment). KEEP IN
# SYNC with OrderFields (src/app/(dashboard)/earnings/graphql/orderFields.gql)
# and the other task-detail copies — divergent selections on the same
# normalized Order cause Apollo cache merge gaps.
mutation CompleteOrderWithVerification($orderId: ID!, $code: String!) {
  completeOrderWithVerification(orderId: $orderId, code: $code) {
    id
    taskId
    quoteId
    customerUserId
    workerUserId
    status
    agreedPrice {
      amount
      currency
    }
    snapshot {
      title
      description
      category
      location {
        lat
        lng
        name
        address
      }
      datetime {
        date
        time
        type
      }
      contactMethod
      quoteMessage
      budgetAmount
      paymentMethod
    }
    createdAt
    workCompletedAt
    workerPaymentAcknowledgedAt
    closedAt
  }
}
