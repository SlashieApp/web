# Committed GraphQL schema snapshot for Slashie web (sync with backend; regenerate types via `npm run codegen`).

scalar DateTime

enum BudgetUnit {
  USD
  GBP
}

enum TaskCategory {
  PLUMBING
  ELECTRICAL
  PAINTING
  GARDENING
}

enum TaskPaymentMethod {
  CASH
  BANK_TRANSFER
}

enum TaskContactMethod {
  PHONE
  EMAIL
  IN_APP
}

enum DayOfWeek {
  SUN
  MON
  TUE
  WED
  THU
  FRI
  SAT
}

enum TaskStatus {
  OPEN
  POSTED
  PUBLISHED
  IN_PROGRESS
  COMPLETED
  CANCELLED
}

enum OfferStatus {
  PENDING
  ACCEPTED
  DECLINED
  REJECTED
  WITHDRAWN
}

enum Bucket {
  TASK_IMAGES
}

enum LoginMethod {
  APPLE
  GOOGLE
  PASSWORD
}

type Location {
  lat: Float
  lng: Float
  name: String
  address: String
}

input LocationInput {
  lat: Float
  lng: Float
  name: String
  address: String
}

input DayAvailabilityInput {
  day: DayOfWeek!
  slots: [String!]!
}

input CreateTaskInput {
  title: String!
  description: String!
  budget: Float!
  budgetUnit: BudgetUnit!
  paymentMethod: TaskPaymentMethod!
  address: String!
  location: LocationInput!
  category: TaskCategory!
  availability: [DayAvailabilityInput!]!
  preferredDateTime: DateTime!
  preferredContactMethod: TaskContactMethod!
  images: [String!]
}

input AddOfferInput {
  taskId: ID!
  pricePence: Int!
  message: String
}

input AcceptOfferInput {
  location: LocationInput
  preferredDate: DateTime
}

input AddReviewInput {
  taskId: ID!
  rating: Int!
  comment: String
}

input AddTaskCommentInput {
  taskId: ID!
  body: String!
}

input LoginInput {
  email: String
  method: LoginMethod
  oauthToken: String
  password: String
}

input ProRegistrationInput {
  bio: String
  firstName: String!
  lastName: String!
  location: LocationInput!
  skills: [String!]
  tagline: String
  yearsExperience: Int
}

input UpdateMyMembershipInput {
  tier: String
}

input UpdateMyProfileInput {
  firstName: String
  lastName: String
  contactNumber: String
}

input UpdateMySettingsInput {
  isProfilePrivate: Boolean
  marketingEmails: Boolean
}

input RateProfessionalInput {
  taskId: ID
  professionalId: ID
  comment: String
  communicationRating: Int
  punctualityRating: Int
  workQualityRating: Int
  highlights: [String!]
  rating: Int
}

type User {
  id: ID!
  email: String!
  createdAt: DateTime
  firstName: String
  lastName: String
  profile: Profile
  settings: UserSettings
}

type Profile {
  name: String
  contactNumber: String
  avatarUrl: String
}

type AuthPayload {
  token: String!
  user: User!
}

type ForgotPasswordPayload {
  success: Boolean!
  resetToken: String
}

type S3UploadUrlPayload {
  url: String!
}

type Category {
  id: ID!
  name: String!
  createdAt: DateTime!
}

type Offer {
  id: ID!
  taskId: ID!
  workerUserId: ID!
  pricePence: Int!
  message: String
  status: OfferStatus!
  createdAt: DateTime!
  amount: Float
}

type Task {
  id: ID!
  title: String!
  description: String!
  address: String
  location: Location
  locationLat: Float
  locationLng: Float
  locationName: String
  status: TaskStatus!
  createdByUserId: ID
  createdAt: DateTime!
  dateTime: DateTime
  category: TaskCategory!
  priceOfferPence: Int
  paymentMethod: TaskPaymentMethod
  contactMethod: String
  offers: [Offer!]!
  selectedOfferId: ID
  completedAt: DateTime
  confirmedAt: DateTime
}

type TaskComment {
  id: ID!
  body: String!
  createdAt: DateTime!
  userId: ID!
}

type Review {
  id: ID!
  rating: Int!
  comment: String
  createdAt: DateTime!
  communicationRating: Int
  punctualityRating: Int
  workQualityRating: Int
}

type Endorsement {
  id: ID!
  comment: String
  createdAt: DateTime!
}

type Skill {
  id: ID!
  name: String!
}

type Worker {
  id: ID!
  userId: ID
  bio: String
  isVerified: Boolean
  rating: Float
  reviewCount: Int
  yearsExperience: Int
  isProMember: Boolean
  isPaid: Boolean
  tier: String
  renewsAt: DateTime
  location: Location
  skills: [Skill!]
  user: User
}

type UserMembership {
  isPaid: Boolean!
  tier: String
  renewsAt: DateTime
}

type UserSettings {
  isProfilePrivate: Boolean
  marketingEmails: Boolean
}

type Query {
  health: String!
  me: User!
  categories: [Category!]!
  task(id: ID!): Task
  taskWorkflow(id: ID!): Task
  tasks(
    lat: Float
    lng: Float
    radiusMiles: Float
    search: String
    category: TaskCategory
    minPricePence: Int
    maxPricePence: Int
    dateTimeFrom: DateTime
    dateTimeTo: DateTime
  ): [Task!]!
  myTasks(status: [TaskStatus!]): [Task!]!
  worker(id: ID!): Worker
  searchProfessionals(location: String, skill: String): [Worker!]!
  getS3UploadUrl(bucket: Bucket!, key: String!, index: Int): S3UploadUrlPayload!
}

type Mutation {
  register(
    email: String!
    password: String!
    contactNumber: String
    name: String
  ): AuthPayload!
  login(email: String!, password: String!, method: LoginMethod): AuthPayload!
  loginWithMethod(input: LoginInput!): AuthPayload!
  forgotPassword(email: String!): ForgotPasswordPayload!
  resetPassword(token: String!, newPassword: String!): AuthPayload!
  createTask(input: CreateTaskInput!): Task!
  addOffer(input: AddOfferInput!): Offer!
  acceptOffer(input: AcceptOfferInput, offerId: ID): Task!
  makeOffer(amount: Float!, taskId: ID!, message: String): Offer!
  addTaskComment(input: AddTaskCommentInput!): TaskComment!
  cancelTask(taskId: ID!): Task!
  completeTask(taskId: ID!): Task!
  confirmTask(taskId: ID!): Task!
  markTaskComplete(taskId: ID!): Task!
  addReview(input: AddReviewInput!): Review!
  endorseProfessional(
    comment: String
    professionalId: ID!
    skillId: ID!
  ): Endorsement!
  rateProfessional(input: RateProfessionalInput!): Review!
  registerAsPro(input: ProRegistrationInput!): Worker!
  updateMyMembership(input: UpdateMyMembershipInput!): UserMembership!
  updateMyProfile(input: UpdateMyProfileInput!): User!
  updateMySettings(input: UpdateMySettingsInput!): User!
  upgradeToProMembership: Worker!
}
