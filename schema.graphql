scalar DateTime

type User {
  id: ID!
  email: String!
  createdAt: DateTime!
}

type AuthPayload {
  token: String!
  user: User!
}

type ForgotPasswordPayload {
  success: Boolean!
  resetToken: String
}

enum TaskStatus {
  OPEN
  IN_PROGRESS
  COMPLETED
  CANCELLED
}

enum OfferStatus {
  PENDING
  ACCEPTED
  REJECTED
}

input CreateTaskInput {
  title: String!
  description: String!
  location: String
  photos: [String!]
}

input AddOfferInput {
  taskId: ID!
  pricePence: Int!
  message: String
}

type Offer {
  id: ID!
  taskId: ID!
  workerUserId: ID!
  pricePence: Int!
  message: String
  status: OfferStatus!
  createdAt: DateTime!
}

type Task {
  id: ID!
  title: String!
  description: String!
  location: String
  photos: [String!]!
  status: TaskStatus!
  createdByUserId: ID!
  createdAt: DateTime!
  offers: [Offer!]!
}

type Job {
  id: ID!
  status: String!
  customerUserId: ID!
}

type Query {
  health: String!
  me: User
  tasks(limit: Int, offset: Int): [Task!]!
  task(id: ID!): Task
  job(id: ID!): Job
  myJobs: [Job!]!
}

type Mutation {
  register(email: String!, password: String!): AuthPayload!
  login(email: String!, password: String!): AuthPayload!
  forgotPassword(email: String!): ForgotPasswordPayload!
  resetPassword(token: String!, newPassword: String!): AuthPayload!
  createTask(input: CreateTaskInput!): Task!
  addOffer(input: AddOfferInput!): Offer!
}
