query MyQuotes($filter: TaskFilter, $sort: TaskSort) {
  me {
    worker {
      quotedTasks(filter: $filter, sort: $sort) {
        id
        title
        description
        category
        budget {
          amount
          currency
          type
          paymentMethod
        }
        datetime {
          date
          time
          type
        }
        images
        status
        location {
          lat
          lng
          name
          address
        }
        poster {
          id
        }
        quotes {
          id
          taskId
          workerUserId
          price {
            currency
            amount
          }
          message
          status
          createdAt
        }
      }
    }
  }
}
