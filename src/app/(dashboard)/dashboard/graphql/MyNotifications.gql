query MyNotifications($first: Int, $after: String, $unreadOnly: Boolean) {
  me {
    notifications(first: $first, after: $after, unreadOnly: $unreadOnly) {
      nextCursor
      items {
        id
        type
        title
        body
        taskId
        orderId
        quoteId
        actorUserId
        readAt
        createdAt
      }
    }
  }
}
