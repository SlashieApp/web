#import "./WorkerMembershipFields.gql"

query Me {
  me {
    id
    email
    emailVerified
    phoneVerified
    phoneVerifiedAt
    createdAt
    enabledLoginMethods
    profile {
      name
      contactNumber
      avatarUrl
      bio
      dateOfBirth
      defaultPreferredContactMethod
      emailVerified
      phoneVerified
    }
    settings {
      isProfilePrivate
      marketingEmails
    }
    workerEligibility
    worker {
      id
      legalName
      bio
      tagline
      yearsExperience
      isVerified
      tasksCompletedCount
      locationAddress
      locationLat
      locationLng
      membership {
        ...WorkerMembershipFields
      }
      earnings {
        pending {
          amount
          currency
        }
      }
    }
  }
}
