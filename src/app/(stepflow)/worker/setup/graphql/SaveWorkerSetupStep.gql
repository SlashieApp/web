mutation SaveWorkerSetupStep($input: SaveWorkerSetupStepInput!) {
  saveWorkerSetupStep(input: $input) {
    id
    legalName
    bio
    tagline
    primaryCategory
    yearsExperience
    skills
    qualifications
    travelRadiusMiles
    portfolioUrls
    location {
      address
      lat
      lng
      name
    }
    setupProgress {
      currentSubStep
      completedSubSteps
      isComplete
    }
    profile {
      name
      avatarUrl
    }
    user {
      emailVerified
      phoneVerified
      profile {
        contactNumber
      }
    }
  }
}
