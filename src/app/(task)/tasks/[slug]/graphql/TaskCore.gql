#import "../../../../(dashboard)/earnings/graphql/orderFields.gql"

# Core task fields for the detail page: everything EXCEPT the heavy `quotes`
# list (fetched client-side via TaskQuotes.gql). Server-rendered for SEO + the
# immediately-needed panels.
#
# - Poster phone/email come via `poster` (User); the API redacts them for
#   non-accepted viewers, and the UI gates display on the accepted worker.
# - Status timestamps come from `timeline` (participant-only; empty for guests).
# - `orders` is a list: poster sees all orders, a worker sees only their own,
#   guests get an empty array.
query TaskCore($id: ID!) {
  task(id: $id) {
    id
    title
    description
    category
    views
    budget {
      amount
      currency
      type
      paymentMethod
    }
    datetime {
      date
      time
      type
    }
    images
    status
    location {
      lat
      lng
      name
      address
    }
    poster {
      id
      email
      profile {
        name
        avatarUrl
        contactNumber
      }
    }
    timeline {
      type
      timestamp
      actor {
        id
        profile {
          name
          avatarUrl
        }
      }
      data
    }
    orders {
      ...OrderFields
      completionVerificationCode
    }
  }
}
