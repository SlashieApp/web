# Heavy quotes list (a worker profile per quote). Fetched client-side after the
# SSR shell paints, so it can stream in with a skeleton. Field selection mirrors
# the `quotes` block of Task.gql so the merged shape matches TaskDetailRecord.
query TaskQuotes($id: ID!) {
  task(id: $id) {
    id
    quotes {
      id
      taskId
      workerUserId
      estimatedDuration
      price {
        currency
        amount
      }
      message
      status
      createdAt
      worker {
        id
        profile {
          name
          avatarUrl
        }
        worker {
          id
          isVerified
        }
      }
    }
  }
}
