scalar DateTime

type User {
  id: ID!
  email: String!
  createdAt: DateTime!
}

type AuthPayload {
  token: String!
  user: User!
}

type ForgotPasswordPayload {
  success: Boolean!
  resetToken: String
}

enum TaskStatus {
  OPEN
  IN_PROGRESS
  COMPLETED
  CANCELLED
}

enum OfferStatus {
  PENDING
  ACCEPTED
  REJECTED
}

enum TaskPaymentMethod {
  CASH
  BANK_TRANSFER
}

input CreateTaskInput {
  title: String!
  description: String!
  location: String
  dateTime: DateTime!
  category: String!
  priceOfferPence: Int!
  paymentMethod: TaskPaymentMethod!
  contactMethod: String!
}

input AddOfferInput {
  taskId: ID!
  pricePence: Int!
  message: String
}

type Offer {
  id: ID!
  taskId: ID!
  workerUserId: ID!
  pricePence: Int!
  message: String
  status: OfferStatus!
  createdAt: DateTime!
}

type Task {
  id: ID!
  title: String!
  description: String!
  location: String
  status: TaskStatus!
  createdByUserId: ID!
  createdAt: DateTime!
  dateTime: DateTime
  category: String
  priceOfferPence: Int
  paymentMethod: TaskPaymentMethod
  contactMethod: String
  offers: [Offer!]!
}

type PageInfo {
  page: Int!
  pageSize: Int!
  totalItems: Int!
  totalPages: Int!
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

type TaskPage {
  items: [Task!]!
  pageInfo: PageInfo!
}

type Job {
  id: ID!
  status: String!
  customerUserId: ID!
}

type Query {
  health: String!
  me: User
  tasks: TaskPage!
  task(id: ID!): Task
  job(id: ID!): Job
  myJobs: [Job!]!
}

type Mutation {
  register(email: String!, password: String!): AuthPayload!
  login(email: String!, password: String!): AuthPayload!
  forgotPassword(email: String!): ForgotPasswordPayload!
  resetPassword(token: String!, newPassword: String!): AuthPayload!
  createTask(input: CreateTaskInput!): Task!
  addOffer(input: AddOfferInput!): Offer!
}
